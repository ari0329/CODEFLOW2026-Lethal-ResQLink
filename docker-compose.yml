

networks:
  resqlink-network:
    driver: bridge

volumes:
  mongo-data:
  kafka-data:
  zookeeper-data:

services:

  # ─────────────────────────────────────────
  # ZOOKEEPER (required by Kafka)
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: resqlink-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - resqlink-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # KAFKA (message broker)
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: resqlink-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - resqlink-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # MONGODB (database)
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: resqlink-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: resqlink
    volumes:
      - mongo-data:/data/db
    networks:
      - resqlink-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # AI SERVICE (Python FastAPI)
  # ─────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: resqlink-ai
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:9092
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/resqlink
      - MODEL_DIR=/app/models/saved
    volumes:
      - ./ai-service/models/saved:/app/models/saved
    depends_on:
      - kafka
      - mongodb
    networks:
      - resqlink-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # BACKEND (Node.js Express)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resqlink-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/resqlink
      - KAFKA_BROKER=kafka:9092
      - JWT_SECRET=${JWT_SECRET}
      - AES_KEY=${AES_KEY}
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
      - kafka
      - ai-service
    networks:
      - resqlink-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # FRONTEND (React)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resqlink-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - resqlink-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # NGINX (reverse proxy)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: resqlink-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - resqlink-network
    restart: unless-stopped