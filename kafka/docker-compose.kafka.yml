version: "3.9"

# ── ResQLink Kafka Stack ──────────────────────────────────────────────────────
# Run this FIRST before docker-compose.yml
# Command: docker-compose -f kafka/docker-compose.kafka.yml up -d

services:

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: resqlink-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - resqlink-kafka-net
    

  # ── Kafka Broker ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: resqlink-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
        
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - resqlink-kafka-net
    

  # ── Kafka Topic Initializer ───────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: resqlink-kafka-init
    depends_on:
      - kafka
        
    networks:
      - resqlink-kafka-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo 'Waiting for Kafka...' && sleep 5
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic resqlink.raw_alerts --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic resqlink.processed_alerts --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic resqlink.audit_events --partitions 1 --replication-factor 1
        echo 'Topics created:' && kafka-topics --bootstrap-server kafka:29092 --list
    restart: "no"

  # ── Kafka UI (http://localhost:9000) ──────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: resqlink-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
        
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: resqlink-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
      AUTH_TYPE: "disabled"
    networks:
      - resqlink-kafka-net

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  resqlink-kafka-net:
    name: resqlink-kafka-net
    driver: bridge